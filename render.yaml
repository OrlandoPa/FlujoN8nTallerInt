databases:
  - name: n8n-db
    databaseName: n8ndb
    user: n8nuser
    plan: free

services:
  - type: web
    name: n8n-service
    runtime: image
    image:
      url: docker.io/n8nio/n8n:nightly-038d2ca
    plan: free
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        fromDatabase:
          name: n8n-db
          property: host
      - key: DB_POSTGRESDB_PORT
        fromDatabase:
          name: n8n-db
          property: port
      - key: DB_POSTGRESDB_DATABASE
        fromDatabase:
          name: n8n-db
          property: database
      - key: DB_POSTGRESDB_USER
        fromDatabase:
          name: n8n-db
          property: user
      - key: DB_POSTGRESDB_PASSWORD
        fromDatabase:
          name: n8n-db
          property: password
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: PORT
        value: 5678
      - key: N8N_PORT
        value: 5678
