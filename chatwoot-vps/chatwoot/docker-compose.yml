version: '3'

services:  
  base: &base  
    image: chatwoot/chatwoot:latest  
    env_file: .env  
    volumes:  
      - storage_data:/app/storage

  rails:  
    <<: *base  
    depends_on:  
      - postgres  
      - redis

    environment:  
      - NODE_ENV=production  
      - RAILS_ENV=production  
      - INSTALLATION_ENV=docker  
    entrypoint: docker/entrypoints/rails.sh  
    command: ['bundle', 'exec', 'rails', 's', '-p', '3000', '-b', '0.0.0.0']  
    restart: always

    networks:  
      - default  
      - traefik  
    labels:  
      - traefik.enable=true  
      - traefik.http.routers.chatwoot.rule=Host(`chatwoot.tudominio.com`)  
      - traefik.http.routers.chatwoot.entrypoints=websecure  
      - traefik.http.routers.chatwoot.tls.certresolver=myresolver  
      - traefik.http.services.chatwoot.loadbalancer.server.port=3000  
      - traefik.docker.network=traefik

  sidekiq:  
    <<: *base  
    depends_on:  
      - postgres  
      - redis  
    environment:  
      - NODE_ENV=production  
      - RAILS_ENV=production  
      - INSTALLATION_ENV=docker  
    command: ['bundle', 'exec', 'sidekiq', '-C', 'config/sidekiq.yml']  
    restart: always

  postgres:  
    image: pgvector/pgvector:pg16  
    restart: always  
    ports:  
      - '127.0.0.1:5434:5432'  
    volumes:  
      - postgres_data:/var/lib/postgresql/data  
    environment:  
      - POSTGRES_DB=chatwoot  
      - POSTGRES_USER=postgres  
      - POSTGRES_PASSWORD=TU_PASSWORD_SEGURO_PARA_POSTGRES

  redis:  
    image: redis:alpine  
    restart: always  
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]  
    env_file: .env  
    volumes:  
      - redis_data:/data  
    ports:  
      - '127.0.0.1:6380:6379'

volumes:  
  storage_data:  
  postgres_data:  
  redis_data:

networks:  
  traefik:  
    external: true
